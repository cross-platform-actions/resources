name: Create Resource Bundle

on:
  push:
    branches: '*'
    tags: 'v*'

  pull_request:
    branches:
      - master

jobs:
  build_qemu_linux:
    name: Build QEMU on Linux
    runs-on: ubuntu-latest
    container: alpine:3.18
    steps:
      - name: Clone Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Ruby
        run: apk add --no-cache ruby ruby-bundler ruby-minitest file github-cli

      - name: Run CI Script
        run: ./ci.rb

      - name: Run Tests
        run: ./test.rb

      - name: Create Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Set the repo explicitly so gh does not shell out to git to
          # detect it. The Linux container checkout has no .git directory
          # (git is absent, so checkout downloads a tarball), and the macOS
          # runner's Homebrew git is broken (missing libintl.8.dylib).
          GH_REPO: ${{ github.repository }}
          github_ref_name: ${{ github.ref_name }}
        run: |
          version="${github_ref_name#v}"

          # Matrix jobs run in parallel; the first to arrive creates the
          # draft release, the rest upload their artifacts to it.
          # (gh release create with --draft does not deduplicate by tag.)
          if gh release view "$github_ref_name" >/dev/null 2>&1; then
            gh release upload "$github_ref_name" *.tar --clobber
          else
            sed -n "/^## \[${version}\]/,/^## \[/{/^## \[${version}\]/d;/^## \[/d;p;}" changelog.md \
              | gh release create \
                "$github_ref_name" \
                --title "Resources ${version}" \
                --draft \
                --notes-file - \
                *.tar
          fi

  get_ovmf_uefi_file:
    name: Get OVMF UEFI files
    runs-on: ubuntu-latest
    container: alpine
    steps:
      - name: Install OVMF
        run: apk add ovmf --no-cache

      - name: Persist OVMF file
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ovmf_file
          path: /usr/share/OVMF/OVMF.fd
          retention-days: 1

  build_qemu_macos:
    name: Build QEMU on macOS
    runs-on: macos-26-intel
    needs: [get_ovmf_uefi_file]
    steps:
      - name: Clone Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ovmf_file

      - name: Run CI Script
        run: ./ci.rb

      - name: Run Tests
        run: ./test.rb

      - name: Create Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Set the repo explicitly so gh does not shell out to git to
          # detect it. The Linux container checkout has no .git directory
          # (git is absent, so checkout downloads a tarball), and the macOS
          # runner's Homebrew git is broken (missing libintl.8.dylib).
          GH_REPO: ${{ github.repository }}
          github_ref_name: ${{ github.ref_name }}
        run: |
          version="${github_ref_name#v}"

          # Matrix jobs run in parallel; the first to arrive creates the
          # draft release, the rest upload their artifacts to it.
          # (gh release create with --draft does not deduplicate by tag.)
          if gh release view "$github_ref_name" >/dev/null 2>&1; then
            gh release upload "$github_ref_name" *.tar --clobber
          else
            sed -n "/^## \[${version}\]/,/^## \[/{/^## \[${version}\]/d;/^## \[/d;p;}" changelog.md \
              | gh release create \
                "$github_ref_name" \
                --title "Resources ${version}" \
                --draft \
                --notes-file - \
                *.tar
          fi
